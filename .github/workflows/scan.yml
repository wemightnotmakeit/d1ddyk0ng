name: scan

on:
  workflow_dispatch:
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  prepare:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.batch.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4

      - name: pull latest queue state
        run: git pull origin main || true

      - name: generate batch
        id: batch
        run: |
          pip install requests -q 2>/dev/null
          MATRIX=$(python3 scripts/next_batch.py)
          echo "matrix=$MATRIX" >> $GITHUB_OUTPUT
          echo "Batch size: $(echo $MATRIX | python3 -c 'import json,sys; print(len(json.load(sys.stdin)["block"]))')"

      - name: save queue state
        run: |
          git config user.email "scan@noreply"
          git config user.name "scanner"
          git add data/
          git diff --cached --quiet || git commit -m "queue: updated ranges"
          git push || true

  scan:
    needs: prepare
    runs-on: ubuntu-latest
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix: ${{ fromJson(needs.prepare.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: install
        run: |
          sudo apt-get install -y masscan 2>/dev/null
          pip install pymongo requests eth-account 2>/dev/null

      - name: scan and probe
        run: |
          TARGET="${{ matrix.block }}"
          SAFE=$(echo "$TARGET" | tr '/.' '--')
          echo "SAFE_BLOCK=$SAFE" >> $GITHUB_ENV

          sudo masscan "$TARGET" -p8545,2375,8888,9200,6379,27017 \
            --rate=300000 \
            --wait=2 \
            -oL results.txt 2>/dev/null || true

          grep "^open" results.txt | awk '{print $4":"$3}' > candidates.txt || true
          echo "masscan: $(wc -l < candidates.txt) open ports in $TARGET"

          python3 probe.py
          echo "findings: $(wc -l < findings.txt 2>/dev/null || echo 0)"

      - name: upload
        if: always()
        uses: actions/upload-artifact@v4.6.2
        with:
          name: hits-${{ env.SAFE_BLOCK }}-${{ github.run_id }}
          path: |
            findings.txt
            candidates.txt
          retention-days: 3
          if-no-files-found: ignore

  collect:
    runs-on: ubuntu-latest
    needs: scan
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: pull latest
        run: git pull origin main || true

      - uses: actions/download-artifact@v4
        with:
          path: raw/
          pattern: hits-*

      - name: aggregate, mark done, commit
        run: |
          mkdir -p data
          find raw/ -name "findings.txt" -exec cat {} \; > data/latest_findings.jsonl 2>/dev/null || true
          find raw/ -name "candidates.txt" -exec cat {} \; | sort -u > data/latest.txt 2>/dev/null || true

          FINDINGS=$(wc -l < data/latest_findings.jsonl 2>/dev/null || echo 0)
          COUNT=$(wc -l < data/latest.txt 2>/dev/null || echo 0)

          # Mark current batch as done
          if [ -f data/current_batch.txt ]; then
            cat data/current_batch.txt >> data/ranges_done.txt
            sort -u data/ranges_done.txt -o data/ranges_done.txt
            # Remove done ranges from queue
            comm -23 <(sort data/ranges_queue.txt 2>/dev/null) <(sort data/ranges_done.txt 2>/dev/null) > data/ranges_queue_tmp.txt || true
            mv data/ranges_queue_tmp.txt data/ranges_queue.txt 2>/dev/null || true
            DONE=$(wc -l < data/ranges_done.txt 2>/dev/null || echo 0)
            QUEUED=$(wc -l < data/ranges_queue.txt 2>/dev/null || echo 0)
            echo "Ranges done: $DONE | Queued: $QUEUED"
          fi

          cat data/latest_findings.jsonl >> data/cumulative_findings.jsonl 2>/dev/null || true
          cat data/latest.txt >> data/cumulative.txt 2>/dev/null || true
          sort -u data/cumulative.txt -o data/cumulative.txt 2>/dev/null || true
          TOTAL=$(wc -l < data/cumulative.txt 2>/dev/null || echo 0)

          echo "Findings: $FINDINGS | Ports: $COUNT | Cumulative: $TOTAL"

          git config user.email "scan@noreply"
          git config user.name "scanner"
          git add data/
          git diff --cached --quiet || git commit -m "scan $(date -u +%Y-%m-%dT%H:%M) — $FINDINGS findings, $COUNT ports, $TOTAL total"
          git pull --rebase origin main || true
          git push
