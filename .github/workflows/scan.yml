name: scan

on:
  workflow_dispatch:
    inputs:
      range:
        description: 'CIDR target'
        required: false
        default: ''
  schedule:
    - cron: '0 * * * *'

permissions:
  contents: write

jobs:
  scan:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        block:
          - "45.33.0.0/16"
          - "45.56.0.0/16"
          - "104.131.0.0/16"
          - "138.68.0.0/16"
          - "167.99.0.0/16"
          - "139.162.0.0/16"
          - "172.104.0.0/16"
          - "45.32.0.0/16"
          - "149.28.0.0/16"
          - "207.148.0.0/16"
          - "65.108.0.0/16"
          - "88.99.0.0/16"
          - "116.202.0.0/16"
          - "5.161.0.0/16"
          - "51.89.0.0/16"
          - "51.68.0.0/16"
          - "51.222.0.0/16"
          - "64.225.0.0/16"
          - "134.209.0.0/16"
          - "178.128.0.0/16"

    steps:
      - name: install
        run: sudo apt-get install -y masscan 2>/dev/null

      - name: scan and probe
        run: |
          TARGET="${{ github.event.inputs.range || matrix.block }}"
          SAFE=$(echo "$TARGET" | tr '/.' '--')
          echo "SAFE_BLOCK=$SAFE" >> $GITHUB_ENV

          sudo masscan "$TARGET" -p8545,2375,8888,9200,6379,27017 \
            --rate=300000 \
            --wait=2 \
            -oL results.txt 2>/dev/null || true

          grep "^open" results.txt | awk '{print $4":"$3}' > candidates.txt || true
          echo "candidates: $(wc -l < candidates.txt)"

          > hits.txt
          while IFS=: read -r IP PORT; do
            [ -z "$IP" ] && continue

            if [ "$PORT" = "2375" ]; then
              # Docker: check /info responds with ServerVersion
              OUT=$(curl -s --max-time 5 "http://$IP:2375/info" 2>/dev/null)
              if echo "$OUT" | grep -q "ServerVersion"; then
                RUNNING=$(echo "$OUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ContainersRunning',0))" 2>/dev/null || echo "?")
                VERSION=$(echo "$OUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('ServerVersion','?'))" 2>/dev/null || echo "?")
                echo "$IP:$PORT docker=$VERSION running=$RUNNING" >> hits.txt
                echo "  DOCKER OPEN: $IP docker=$VERSION running=$RUNNING"
              fi

            elif [ "$PORT" = "8545" ]; then
              # ETH RPC: check eth_blockNumber responds
              OUT=$(curl -s --max-time 5 -X POST -H "Content-Type: application/json" \
                -d '{"jsonrpc":"2.0","method":"eth_blockNumber","params":[],"id":1}' \
                "http://$IP:8545" 2>/dev/null)
              if echo "$OUT" | grep -q "result"; then
                BLOCK=$(echo "$OUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(int(d['result'],16))" 2>/dev/null || echo "?")
                # Check for unlocked accounts
                ACCTS=$(curl -s --max-time 5 -X POST -H "Content-Type: application/json" \
                  -d '{"jsonrpc":"2.0","method":"eth_accounts","params":[],"id":1}' \
                  "http://$IP:8545" 2>/dev/null | python3 -c "import sys,json; d=json.load(sys.stdin); print(','.join(d.get('result',[])))" 2>/dev/null || echo "")
                echo "$IP:$PORT block=$BLOCK accounts=$ACCTS" >> hits.txt
                echo "  ETH OPEN: $IP block=$BLOCK accounts=$ACCTS"
              fi

            elif [ "$PORT" = "8888" ]; then
              # Jupyter: check if login page or token-free
              OUT=$(curl -s --max-time 5 "http://$IP:8888/api/kernels" 2>/dev/null)
              if echo "$OUT" | grep -q -v "401\|Unauthorized\|login"; then
                echo "$IP:$PORT jupyter=open" >> hits.txt
                echo "  JUPYTER OPEN: $IP"
              fi

            elif [ "$PORT" = "9200" ]; then
              # Elasticsearch: check cluster info
              OUT=$(curl -s --max-time 5 "http://$IP:9200" 2>/dev/null)
              if echo "$OUT" | grep -q "cluster_name\|tagline"; then
                NAME=$(echo "$OUT" | python3 -c "import sys,json; d=json.load(sys.stdin); print(d.get('cluster_name','?'))" 2>/dev/null || echo "?")
                echo "$IP:$PORT elastic=$NAME" >> hits.txt
                echo "  ELASTIC OPEN: $IP cluster=$NAME"
              fi

            elif [ "$PORT" = "6379" ]; then
              # Redis: send PING
              OUT=$(echo -e "*1\r\n\$4\r\nPING\r\n" | nc -w 3 "$IP" 6379 2>/dev/null)
              if echo "$OUT" | grep -q "PONG\|redis_version"; then
                echo "$IP:$PORT redis=open" >> hits.txt
                echo "  REDIS OPEN: $IP"
              fi

            elif [ "$PORT" = "27017" ]; then
              # MongoDB: check if port accepts connection (mongo handshake is binary, curl will fail but nc won't)
              OUT=$(curl -s --max-time 5 "http://$IP:27017" 2>/dev/null)
              if echo "$OUT" | grep -q "MongoDB\|mongo"; then
                echo "$IP:$PORT mongo=open" >> hits.txt
                echo "  MONGO OPEN: $IP"
              fi
            fi
          done < candidates.txt

          echo "verified live: $(wc -l < hits.txt)"
          cat hits.txt

      - name: upload
        uses: actions/upload-artifact@v4
        with:
          name: hits-${{ env.SAFE_BLOCK }}-${{ github.run_id }}
          path: hits.txt
          retention-days: 3
          if-no-files-found: ignore
        if: always()

  collect:
    runs-on: ubuntu-latest
    needs: scan
    if: always()
    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: raw/
          pattern: hits-*

      - name: aggregate and commit
        run: |
          mkdir -p data
          find raw/ -name "hits.txt" -exec cat {} \; | sort -u > data/latest.txt
          COUNT=$(wc -l < data/latest.txt)
          echo "Live verified targets: $COUNT"
          cat data/latest.txt

          cat data/latest.txt >> data/cumulative.txt 2>/dev/null || true
          sort -u data/cumulative.txt -o data/cumulative.txt
          TOTAL=$(wc -l < data/cumulative.txt)

          git config user.email "scan@noreply"
          git config user.name "scanner"
          git add data/
          git diff --cached --quiet || git commit -m "scan $(date -u +%Y-%m-%dT%H:%M) — $COUNT live, $TOTAL total"
          git push
