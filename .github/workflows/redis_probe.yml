name: redis-probe

on:
  workflow_dispatch:

permissions:
  contents: write

jobs:
  probe:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    steps:
      - uses: actions/checkout@v4

      - name: pull latest
        run: git pull origin main || true

      - name: extract redis targets
        run: |
          grep ':6379' data/cumulative.txt | cut -d: -f1 | sort -u > redis_targets.txt
          echo "Redis targets: $(wc -l < redis_targets.txt)"

      - name: run redis probe
        run: python3 scripts/redis_probe.py

      - name: commit results
        run: |
          if [ ! -f redis_findings.jsonl ]; then echo "no output"; exit 0; fi
          HITS=$(wc -l < redis_findings.jsonl)
          SECRETS=$(python3 -c "
import json
lines = open('redis_findings.jsonl').readlines()
print(sum(1 for l in lines if json.loads(l).get('secrets')))
" 2>/dev/null || echo 0)
          echo "Hits=$HITS Secrets=$SECRETS"
          cat redis_findings.jsonl >> data/cumulative_findings.jsonl || true
          git config user.email "scan@noreply"
          git config user.name "scanner"
          git add data/cumulative_findings.jsonl redis_findings.jsonl
          git diff --cached --quiet || git commit -m "redis-probe: $HITS open, $SECRETS with secrets"
          git pull --rebase origin main || true
          git push
