name: gh-dork

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read

jobs:
  dork:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4

      - name: run dork scanner
        env:
          GH_TOKEN: ${{ secrets.d1ddyk0ng }}
        run: python3 scripts/gh_dork.py

      - name: report hit count
        run: |
          if [ ! -f gh_findings.jsonl ]; then echo "no output"; exit 0; fi
          HITS=$(wc -l < gh_findings.jsonl)
          echo "Hits: $HITS"

      - name: upload findings
        uses: actions/upload-artifact@v4
        with:
          name: gh-findings-${{ github.run_id }}
          path: gh_findings.jsonl
          retention-days: 90
          if-no-files-found: ignore
