name: gh-dork

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read

jobs:
  dork:
    runs-on: ubuntu-latest
    timeout-minutes: 120
    steps:
      - uses: actions/checkout@v4

      - name: fetch seen list from vps
        env:
          VPS_KEY: ${{ secrets.VPS_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          scp -o StrictHostKeyChecking=no -i ~/.ssh/vps_key root@$VPS_HOST:/opt/agents/gh_findings/seen.txt seen.txt 2>/dev/null || touch seen.txt
          echo "Seen count: $(wc -l < seen.txt)"

      - name: run dork scanner
        env:
          GH_TOKEN: ${{ secrets.d1ddyk0ng }}
        run: python3 scripts/gh_dork.py

      - name: ship to vps
        env:
          VPS_KEY: ${{ secrets.VPS_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          HITS=$(wc -l < gh_findings.jsonl 2>/dev/null || echo 0)
          echo "Hits: $HITS"
          STAMP=$(date +%s)
          scp -o StrictHostKeyChecking=no -i ~/.ssh/vps_key gh_findings.jsonl root@$VPS_HOST:/opt/agents/gh_findings/${STAMP}.jsonl
          scp -o StrictHostKeyChecking=no -i ~/.ssh/vps_key seen.txt root@$VPS_HOST:/opt/agents/gh_findings/seen.txt
          echo "Shipped $HITS findings + updated seen list"
